/* ============================================================

   ============================================================

/* --- CSS Custom Properties (overridden by theme) ----------- */

:root {

  --color-bg:            #fefcf9;
  --color-bg-slide:      #ffffff;

  --color-heading:       #1a365d;

  /* Typography */
  --font-heading:  'Georgia', 'Noto Serif CJK SC', 'STSong', serif;
  --font-body:     system-ui, -apple-system, 'Noto Sans CJK SC', 'PingFang SC', sans-serif;
  --font-mono:     'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;

  /* Sizing */
  --slide-width:   100vw;
  --slide-height:  100vh;
  --content-max-w: 900px;
  --content-pad-x: 4rem;
  --content-pad-y: 2rem;

  /* Slide inner area (16:9 aware) */
  --slide-inner-w: min(90vw, 1600px);
  --slide-inner-h: min(90vh, 900px);
}

/* --- Reset & Base ----------------------------------------- */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 20px;            /* base for 1080p projection */
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-body);
  color: var(--color-text);
  background: var(--color-bg);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;           /* JS toggles this for scroll mode */
}

/* ============================================================
   SLIDE MODE (presenting) — full-viewport snap scroll
   ============================================================ */

body.presenting {
  overflow: hidden;
}

body.presenting #presentation {
  scroll-snap-type: y mandatory;
  overflow-y: scroll;
  height: 100vh;
  scroll-behavior: smooth;
}

body.presenting .slide {
  scroll-snap-align: start;
  scroll-snap-stop: always;
  width: 100vw;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 0;
}

body.presenting .slide-content {
  width: var(--slide-inner-w);
  max-height: var(--slide-inner-h);
  overflow-y: auto;
  padding: var(--content-pad-y) var(--content-pad-x);
}

/* ============================================================
   SCROLL MODE (scrolling) — continuous document flow
   ============================================================ */

body.scrolling {
  overflow: visible;
  overflow-x: hidden;
}

body.scrolling #presentation {
  scroll-snap-type: none;
  overflow-y: visible;
  height: auto;
}

body.scrolling .slide {
  scroll-snap-align: none;
  width: 100%;
  min-height: auto;
  height: auto;
  display: block;
  padding: 0;
}

body.scrolling .slide-content {
  width: 100%;
  max-width: var(--content-max-w);
  max-height: none;
  overflow-y: visible;
  margin: 0 auto;
  padding: 3rem 1.5rem;
  border-bottom: 1px solid var(--color-border);
}

body.scrolling .slide:last-child .slide-content {
  border-bottom: none;
}

/* ============================================================
   SLIDE TYPE VARIANTS
   ============================================================ */

/* Title slide — centered, large */
.slide-title .slide-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.slide-title h1 {
  font-size: 2.8rem;

  line-height: 1.2;
}

.slide-title .subtitle {
  font-size: 1.4rem;

}

}

/* Section slide — large centered heading */

  display: flex;
  align-items: center;
  justify-content: center;
}

/* ============================================================
   NAVIGATION CONTROLS (slide mode only)
   ============================================================ */

#slide-controls {
  display: none;                        /* hidden in scroll mode */
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;

#slide-counter {
  font-size: 0.75rem;

  padding: 0.3rem 0;
}

/* ============================================================
   PROGRESS BAR (slide mode only)
   ============================================================ */

#progress-bar {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 3px;
  z-index: 1001;
  background: transparent;
}

body.presenting #progress-bar { display: block; }

#progress-fill {
  height: 100%;
  background: var(--color-accent);
  width: 0%;
  transition: width 0.3s ease;
}

/* ============================================================
   TOGGLE HINT (first visit)
   ============================================================ */

#mode-hint {
  position: fixed;
  top: 1rem;
  left: 50%;
  transform: translateX(-50%);
  background: var(--color-text);
  color: var(--color-bg);
  padding: 0.5rem 1.2rem;
  border-radius: 20px;
  font-size: 0.75rem;
  z-index: 1002;
  opacity: 0;
  transition: opacity 0.5s;
  pointer-events: none;
}

#mode-hint.show { opacity: 0.9; }

/* ============================================================
   KEYBOARD SHORTCUT LEGEND
   ============================================================ */

#shortcuts-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 2000;
  align-items: center;
  justify-content: center;
}

#shortcuts-modal.open { display: flex; }

#shortcuts-modal .modal-content {
  background: var(--color-bg-slide);
  border-radius: 12px;
  padding: 2rem 2.5rem;
  max-width: 420px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

#shortcuts-modal h3 { margin-bottom: 1rem; }

  gap: 0.5rem 1.5rem;
  font-size: 0.85rem;
}

#shortcuts-modal dt {
  font-weight: 600;
  color: var(--color-accent);
  font-family: var(--font-mono);
}

/* ============================================================
   RESPONSIVE BREAKPOINTS
   ============================================================ */

/* 4K / large projector */
@media (min-width: 2000px) {
  html { font-size: 28px; }
  :root { --slide-inner-w: 1800px; --slide-inner-h: 1050px; }
}

/* Laptop / 720p projector */
@media (max-width: 1400px) {
  html { font-size: 18px; }
  :root { --slide-inner-w: 92vw; --content-pad-x: 3rem; }
}

/* Tablet landscape */
@media (max-width: 1024px) {
  html { font-size: 16px; }
  :root { --content-pad-x: 2rem; --content-pad-y: 1.5rem; }
}

/* Mobile — force scroll mode */
@media (max-width: 768px) {
  html { font-size: 15px; }

  body.presenting { overflow: visible; }

  body.presenting #presentation {
    scroll-snap-type: none;
    overflow-y: visible;
    height: auto;
  }

  body.presenting .slide {
    scroll-snap-align: none;
    min-height: auto;
    height: auto;
    padding: 0;
    display: block;
  }

  body.presenting .slide-content {
    width: 100%;
    max-height: none;
    overflow-y: visible;
    padding: 2rem 1.2rem;
  }

  #slide-controls { display: none !important; }
  #progress-bar     { display: none !important; }
}

/* Small mobile */
@media (max-width: 480px) {
  html { font-size: 14px; }
  :root { --content-pad-x: 1rem; --content-pad-y: 1.5rem; }
}

/* ============================================================
   PRINT STYLES
   ============================================================ */

@media print {
  body, body.presenting, body.scrolling {
    overflow: visible !important;
  }

  #presentation {
    scroll-snap-type: none !important;
    overflow: visible !important;
    height: auto !important;
  }

  .slide {
    scroll-snap-align: none !important;
    min-height: auto !important;
    height: auto !important;
    page-break-after: always;
    display: block !important;
    padding: 1cm !important;
  }

  .slide:last-child { page-break-after: auto; }

  #slide-controls, #progress-bar, #mode-hint, #shortcuts-modal {
    display: none !important;
  }
}

<!-- ====== Navigation JavaScript (inlined) ====== -->
<script>
(function() {
  'use strict';

  const body = document.body;
  const presentation = document.getElementById('presentation');
  const slides = presentation.querySelectorAll('.slide');
  const totalSlides = slides.length;
  const counter = document.getElementById('slide-counter');
  const progressFill = document.getElementById('progress-fill');
  const modeHint = document.getElementById('mode-hint');
  const shortcutsModal = document.getElementById('shortcuts-modal');

  let currentMode = 'presenting';   // 'presenting' | 'scrolling'
  let currentSlide = 1;

  // ---- Detect mobile: default to scroll mode ----
  if (window.innerWidth < 768) {
    setMode('scrolling', false);
  }

  // ---- Slide tracking (slide mode) ----
  function updateSlideNumber(num) {
    currentSlide = num;
    if (counter) {
      counter.textContent = num + ' / ' + totalSlides;
    }
    if (progressFill) {
      progressFill.style.width = ((num - 1) / (totalSlides - 1) * 100) + '%';
    }
    // Sync URL hash
    if (window.location.hash !== '#slide-' + num) {
      history.replaceState(null, '', '#slide-' + num);
    }
  }

  function getCurrentSlide() {
    if (currentMode !== 'presenting') return 1;
    const containerTop = presentation.scrollTop;
    const containerHeight = presentation.clientHeight;
    let best = 1;
    let bestDist = Infinity;

    slides.forEach(function(slide, i) {
      const top = slide.offsetTop;
      const dist = Math.abs(top - containerTop - containerHeight * 0.2);
      if (dist < bestDist) {
        bestDist = dist;
        best = i + 1;
      }
    });
    return best;
  }

  // ---- Scroll handler (slide mode) ----
  let scrollTicking = false;
  presentation.addEventListener('scroll', function() {
    if (currentMode !== 'presenting') return;
    if (!scrollTicking) {
      requestAnimationFrame(function() {
        updateSlideNumber(getCurrentSlide());
        scrollTicking = false;
      });
      scrollTicking = true;
    }
  }, { passive: true });

  // ---- Navigation ----
  function goToSlide(num) {
    if (num < 1 || num > totalSlides) return;
    if (currentMode === 'presenting') {
      const target = document.getElementById('slide-' + num);
      if (target) {
        target.scrollIntoView({ behavior: 'smooth' });
      }
    } else {
      const target = document.getElementById('slide-' + num);
      if (target) {
        target.scrollIntoView({ behavior: 'smooth' });
      }
    }
    updateSlideNumber(num);
  }

  function nextSlide() { goToSlide(currentSlide + 1); }
  function prevSlide() { goToSlide(currentSlide - 1); }

  // ---- Mode switching ----
  function setMode(mode, showHint) {
    currentMode = mode;
    body.className = mode;

    if (mode === 'presenting') {
      updateSlideNumber(getCurrentSlide());
    } else {
      if (counter) counter.textContent = '1 / ' + totalSlides;
      if (progressFill) progressFill.style.width = '0%';
    }

    if (showHint !== false) {
      var msg = mode === 'presenting' ? '📺 投屏模式 — 按 M 切换' : '📱 阅读模式 — 按 M 切换';
      showModeHint(msg);
    }

    // Re-trigger MathJax if needed
    if (window.MathJax && window.MathJax.typesetPromise) {
      setTimeout(function() { MathJax.typesetPromise(); }, 300);
    }
  }

  function toggleMode() {
    setMode(currentMode === 'presenting' ? 'scrolling' : 'presenting');
  }

  function showModeHint(msg) {
    if (modeHint) {
      modeHint.textContent = msg;
      modeHint.classList.add('show');
      clearTimeout(modeHint._timeout);
      modeHint._timeout = setTimeout(function() {
        modeHint.classList.remove('show');
      }, 2500);
    }
  }

  // ---- Fullscreen ----
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(function(){});
    } else {
      document.exitFullscreen();
    }
  }

  // ---- Shortcuts modal ----
  function toggleShortcuts() {
    if (shortcutsModal) {
      var isOpen = shortcutsModal.classList.contains('open');
      if (isOpen) {
        shortcutsModal.classList.remove('open');
        shortcutsModal.setAttribute('aria-hidden', 'true');
      } else {
        shortcutsModal.classList.add('open');
        shortcutsModal.setAttribute('aria-hidden', 'false');
      }
    }
  }

  // ---- Keyboard ----
  document.addEventListener('keydown', function(e) {
    // Don't intercept when typing in inputs
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' ||
        e.target.isContentEditable) return;

    switch (e.key) {
      case 'ArrowRight': case 'ArrowDown': case ' ':
        e.preventDefault(); nextSlide(); break;
      case 'ArrowLeft':  case 'ArrowUp':
        e.preventDefault(); prevSlide(); break;
      case 'Home':
        e.preventDefault(); goToSlide(1); break;
      case 'End':
        e.preventDefault(); goToSlide(totalSlides); break;
      case 'm': case 'M':
        e.preventDefault(); toggleMode(); break;
      case 'f': case 'F':
        if (!e.metaKey && !e.ctrlKey) { e.preventDefault(); toggleFullscreen(); }
        break;
      case '?':
        e.preventDefault(); toggleShortcuts(); break;
      case 'Escape':
        if (shortcutsModal && shortcutsModal.classList.contains('open')) {
          shortcutsModal.classList.remove('open');
          shortcutsModal.setAttribute('aria-hidden', 'true');
        }
        break;
    }
  });

  // ---- Touch swipe ----
  var touchStartY = 0;
  document.addEventListener('touchstart', function(e) {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchend', function(e) {
    if (currentMode !== 'presenting') return;
    var dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dy) > 60) {
      if (dy < 0) nextSlide();
      else prevSlide();
    }
  });

  // ---- Button bindings ----
  document.getElementById('btn-prev')?.addEventListener('click', prevSlide);
  document.getElementById('btn-next')?.addEventListener('click', nextSlide);
  document.getElementById('btn-mode')?.addEventListener('click', toggleMode);
  document.getElementById('btn-fullscreen')?.addEventListener('click', toggleFullscreen);

  // ---- Modal click-outside-to-close ----
  if (shortcutsModal) {
    shortcutsModal.addEventListener('click', function(e) {
      if (e.target === shortcutsModal) toggleShortcuts();
    });
  }

  // ---- URL hash navigation ----
  function handleHash() {
    var hash = window.location.hash;
    var m = hash.match(/^#slide-(\d+)$/);
    if (m) {
      var n = parseInt(m[1], 10);
      if (n >= 1 && n <= totalSlides) {
        goToSlide(n);
      }
    }
  }
  window.addEventListener('hashchange', handleHash);
  handleHash();  // check on initial load

  // ---- Initialize ----
  updateSlideNumber(1);

  // ---- MathJax reprocess on slide change (for lazy rendering) ----
  if (window.MathJax && window.MathJax.typesetPromise) {
    var observer = new MutationObserver(function() {
      MathJax.typesetPromise();
    });
    slides.forEach(function(slide) {
      if (slide.dataset.hasMath === 'true') {
        observer.observe(slide, { childList: true, subtree: true, once: true });
      }
    });
  }

  console.log('📊 Stats Slide Processor — ' + totalSlides + ' slides ready');
  console.log('   ← → keys to navigate, M to toggle scroll mode, ? for shortcuts');
})();
</script>
